services:
  db:
    image: postgres:18
    container_name: postgres_db
    restart: always
    
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?password required}
      POSTGRES_DB: ${POSTGRES_DB:-wd}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wd"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: